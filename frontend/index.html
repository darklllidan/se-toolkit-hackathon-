<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Resource Sync</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg-page:          #f4f6fb;
        --bg-card:          #ffffff;
        --bg-navbar:        #ffffff;
        --bg-input:         #ffffff;
        --bg-chip:          #f0f4ff;
        --bg-secondary:     #f3f4f6;
        --bg-empty:         #fafafa;
        --text-primary:     #111827;
        --text-secondary:   #6b7280;
        --text-muted:       #9ca3af;
        --border:           #e5e7eb;
        --border-light:     #f0f0f0;
        --accent:           #4f46e5;
        --accent-hover:     #4338ca;
        --accent-light:     #ede9fe;
        --accent-text:      #4f46e5;
        --chip-border:      #c7d2fe;
        --chip-text:        #4f46e5;
        --tab-active:       #4f46e5;
        --tab-inactive:     #6b7280;
        --shadow-sm:        0 1px 3px rgba(0,0,0,0.06);
        --shadow-md:        0 4px 16px rgba(0,0,0,0.10);
        --shadow-modal:     0 20px 60px rgba(0,0,0,0.18);
        --btn-secondary-bg: #f3f4f6;
        --btn-secondary-text: #374151;
        --live-bg:          #f0fdf4;
        --live-text:        #059669;
        --live-border:      #a7f3d0;
        --navbar-border:    #e5e7eb;
        --navbar-text:      #374151;
        --navbar-link:      #4f46e5;
      }

      [data-theme="dark"] {
        --bg-page:          #0f0e1a;
        --bg-card:          #1c1a2e;
        --bg-navbar:        #1e1b4b;
        --bg-input:         rgba(255,255,255,0.06);
        --bg-chip:          rgba(79,70,229,0.15);
        --bg-secondary:     rgba(255,255,255,0.06);
        --bg-empty:         rgba(255,255,255,0.03);
        --text-primary:     #e5e7eb;
        --text-secondary:   #9ca3af;
        --text-muted:       #6b7280;
        --border:           rgba(255,255,255,0.09);
        --border-light:     rgba(255,255,255,0.05);
        --accent:           #4f46e5;
        --accent-hover:     #6366f1;
        --accent-light:     rgba(79,70,229,0.22);
        --accent-text:      #a5b4fc;
        --chip-border:      rgba(99,102,241,0.35);
        --chip-text:        #a5b4fc;
        --tab-active:       #818cf8;
        --tab-inactive:     #6b7280;
        --shadow-sm:        0 1px 3px rgba(0,0,0,0.35);
        --shadow-md:        0 4px 16px rgba(0,0,0,0.45);
        --shadow-modal:     0 20px 60px rgba(0,0,0,0.55);
        --btn-secondary-bg: rgba(255,255,255,0.08);
        --btn-secondary-text: #e5e7eb;
        --live-bg:          rgba(16,185,129,0.10);
        --live-text:        #34d399;
        --live-border:      rgba(16,185,129,0.30);
        --navbar-border:    rgba(255,255,255,0.06);
        --navbar-text:      #d1d5db;
        --navbar-link:      #a5b4fc;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg-page);
        color: var(--text-primary);
        transition: background 0.2s, color 0.2s;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
